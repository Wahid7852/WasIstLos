name: Release

on:
  push:
    branches: [ release ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt -y install build-essential intltool cmake pkg-config libgtkmm-3.0-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libcanberra-dev debhelper zsync squashfs-tools

      - name: Build & Install
        run: |
          mkdir -p build/release && cd build/release
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr ../..
          make -j4
          make install DESTDIR=../../AppDir

      - name: Set Version
        run: |
          version=$(cat "build/release/src/VERSION")
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${version}" >> "$GITHUB_ENV"
          sed -i -E "s/\((.*?)\)/(${version})/g" debian/changelog

      - name: Build Debian Package
        id: dpkg-buildpackage
        uses: jtdor/build-deb-action@v1
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
        with:
          artifacts-dir: "."
          buildpackage-opts: -uc -us -ui

      - name: Build Snap Package
        id: snapcraft
        uses: snapcore/action-build@v1

      - name: Publish Snap to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable

      - name: Build AppImage Package
        id: appimage
        uses: AppImageCrafters/build-appimage@fe2205a4d6056be47051f7b1b3811106e9814910
        with:
          recipe: "./packaging/appimage/AppImageBuilder.yml"
        env:
          UPDATE_INFO: gh-releases-zsync|Wahid7852|YAWF|${{ env.RELEASE_VERSION }}|*x86_64.AppImage.zsync

      - name: Build and Upload Source Package to PPA
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          PPA_GPG_KEY_ID: ${{ secrets.PPA_GPG_KEY_ID }}
          DEBEMAIL: wahidzk0091@gmail.com
          DEBFULLNAME: Wahid7852
        run: |
          sudo apt-get install -y devscripts dput

          echo "$PPA_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          echo "$PPA_GPG_KEY_ID:6:" | gpg --batch --import-ownertrust

          # Launchpad requires a valid Ubuntu series name, not "stable"
          sed -i "1s|($RELEASE_VERSION) stable;|($RELEASE_VERSION~noble1) noble;|" debian/changelog

          # Source-only signed build; -d skips build-dep check on the runner
          debuild -S -sa -d --no-lintian -k"$PPA_GPG_KEY_ID"

          dput ppa:wahid2584/yawf "../yawf_${RELEASE_VERSION}~noble1_source.changes"

      - name: Extract Changelog
        id: changelog
        run: |
          body=$(awk '/^## \[?'"$RELEASE_VERSION"'\]?/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          printf 'body<<%s\n%s\n%s\n' "EOF" "$body" "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_VERSION }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            yawf_${{ env.RELEASE_VERSION }}_amd64.deb
            ${{ steps.snapcraft.outputs.snap }}
            yawf-${{ env.RELEASE_VERSION }}-x86_64.AppImage
