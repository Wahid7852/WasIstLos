# Flatpak manifest scaffold for the Flathub submission.
#
# NOTE: This is a starting point, not a verified build. Before submitting to
# Flathub you must:
#   * pick a current runtime version and test-build with flatpak-builder,
#   * fill in real `commit`/`sha256` for every module source,
#   * confirm the gtkmm-3 + ayatana-appindicator stack builds against the runtime
#     (WebKitGTK 4.1 is provided by org.gnome.Platform).
#
# Build locally with:
#   flatpak-builder --user --install --force-clean build-flatpak packaging/flatpak/io.github.wahid7852.YAWF.yml

app-id: io.github.wahid7852.YAWF
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: yawf

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=io.github.wahid7852.YAWF
  - --filesystem=xdg-download

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: libsigc++-2
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsigc++/2.12/libsigc++-2.12.1.tar.xz
        sha256: a9dbee323351d109b7aee074a9cb89ca3e7bcf8ad8edef1851f4cf359bd50843

  - name: glibmm
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/glibmm/2.66/glibmm-2.66.7.tar.xz
        sha256: fe02c1e5f5825940d82b56b6ec31a12c06c05c1583cfe62f934d0763e1e542b3

  - name: cairomm
    buildsystem: meson
    config-opts:
      - -Dbuild-tests=false
    sources:
      - type: archive
        url: https://www.cairographics.org/releases/cairomm-1.14.5.tar.xz
        sha256: 70136203540c884e89ce1c9edfb6369b9953937f6cd596d97c78c9758a5d48db

  - name: pangomm
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pangomm/2.46/pangomm-2.46.4.tar.xz
        sha256: b92016661526424de4b9377f1512f59781f41fb16c9c0267d6133ba1cd68db22

  - name: atkmm
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/atkmm/2.28/atkmm-2.28.4.tar.xz
        sha256: 0a142a8128f83c001efb8014ee463e9a766054ef84686af953135e04d28fdab3

  - name: gtkmm-3
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gtkmm/3.24/gtkmm-3.24.9.tar.xz
        sha256: 30d5bfe404571ce566a8e938c8bac17576420eb508f1e257837da63f14ad44ce

  # Ayatana stack for the tray icon (StatusNotifierItem).
  - name: libayatana-ido
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/ayatana-ido.git
        tag: '0.10.4'

  - name: libayatana-indicator
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/libayatana-indicator.git
        tag: '0.9.5'

  # Build-time tool needed by libdbusmenu-gtk3 (not shipped); not in the runtime.
  - name: intltool
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: libdbusmenu-gtk3
    buildsystem: autotools
    config-opts:
      - --with-gtk=3
      - --disable-dumper
      - --disable-tests
      - --disable-gtk-doc
      - --disable-static
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a
      # libdbusmenu 16.04 breaks under modern automake: the HAVE_VALGRIND conditional. Drop the
      # valgrind test dependency, force the conditional off, and regenerate the build files.
      - type: shell
        commands:
          - sed -i '/PKG_CHECK_MODULES(DBUSMENUTESTSVALGRIND/d' configure.ac
          - sed -i 's/^AM_CONDITIONAL(\[HAVE_VALGRIND\].*/AM_CONDITIONAL([HAVE_VALGRIND], [false])/' configure.ac
          - autoreconf -fi

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_BINDINGS_MONO=NO
      - -DENABLE_BINDINGS_VALA=NO
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/libayatana-appindicator.git
        tag: '0.6.0'

  - name: yawf
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/Wahid7852/YAWF.git
        tag: v2.1.0
